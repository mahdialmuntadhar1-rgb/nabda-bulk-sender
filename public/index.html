<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabda Bulk Sender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📱 Nabda Bulk Sender</h1>
        
        <div class="section">
            <h2>1. Select Contact Source</h2>
            <div class="source-selector">
                <label>
                    <input type="radio" name="source" value="csv" checked onchange="toggleSource()">
                    CSV Upload
                </label>
                <label>
                    <input type="radio" name="source" value="supabase" onchange="toggleSource()">
                    Supabase Database
                </label>
            </div>
            
            <div id="csvSection" class="upload-area">
                <input type="file" id="csvFile" accept=".csv">
                <button onclick="loadCSV()">Load CSV</button>
                <span id="csvStatus"></span>
            </div>
            
            <div id="supabaseSection" class="upload-area" style="display: none;">
                <button onclick="loadSupabase()">Load from Supabase</button>
                <span id="supabaseStatus"></span>
            </div>
            
            <div class="preview" id="csvPreview"></div>
        </div>

        <div class="section">
            <h2>2. Select CTA Type</h2>
            <select id="ctaType">
                <option value="">None</option>
                <option value="link">Link Click</option>
                <option value="call">Call Now</option>
                <option value="reply_yes">Reply YES</option>
                <option value="reply_info">Reply INFO</option>
                <option value="event">Event RSVP</option>
                <option value="offer">Limited Offer</option>
            </select>
        </div>

        <div class="section">
            <h2>3. Write Message</h2>
            <textarea id="message" placeholder="Hello {{name}},

This is your message!

Use variables: {{name}}, {{governorate}}, {{category}}, {{phone}}

Reply STOP to opt out."></textarea>
            <div class="variables">
                <strong>Available variables:</strong>
                {{name}}, {{governorate}}, {{category}}, {{phone}}
            </div>
        </div>

        <div class="section">
            <h2>4. Send Messages</h2>
            <button id="sendBtn" onclick="sendMessages()" disabled>Send Messages</button>
            <div id="progress"></div>
        </div>

        <div class="section">
            <h2>5. Results</h2>
            <div id="results"></div>
        </div>

        <div class="section">
            <h2>6. Response Tracking</h2>
            <button onclick="loadResponses()">Load Responses</button>
            <div id="responses"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
